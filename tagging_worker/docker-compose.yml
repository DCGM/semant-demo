services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  tagging_worker:
    build: 
      context: ..  # Build from semant-demo directory
      dockerfile: tagging_worker/Dockerfile  # Specify the Dockerfile location
    depends_on:
      redis:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    restart: on-failure
