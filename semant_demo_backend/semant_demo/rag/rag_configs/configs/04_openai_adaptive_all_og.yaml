id: "xandry12_AdaptiveRagGeneratorOg_openai_default_multiquery"
name: "OG Adaptive RAG with more adaptive approach using OpenAI with multi query and web search"
description: "RAG using OpenAI's big local model GPT-5.1. It has problem with citations, it answers based on provided documents but sometimes will not cite. It supports history between messages and internet/web search using DuckDuckGo."
class_name: "AdaptiveRagGeneratorOg"
params:
  model_type: "OPENAI"
  model_name: "gpt-5.1"
  temperature: 0.0
  search_type : "hybrid"
  alpha: 0.5
  chunk_limit: 5
  qt_strategy : "multi_query"
  max_retries : 3
  web_search_enabled : True
  metadata_extraction_allowed : True
  self_reflection : True
