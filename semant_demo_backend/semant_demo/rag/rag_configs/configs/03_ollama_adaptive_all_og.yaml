id: "xandry12_AdaptiveRagGeneratorOg_ollama_default_multiquery"
name: "OG Adaptive RAG with more adaptive approach using Ollama with multi query and web search"
description: "RAG using Ollama's big local model Gemma3:12b. It has problem with citations, it answers based on provided documents but sometimes will not cite. It supports history between messages and internet/web search using DuckDuckGo."
class_name: "AdaptiveRagGeneratorOg"
params:
  model_type: "OLLAMA"
  model_name: "gemma3:12b"
  temperature: 0.0
  search_type : "hybrid"
  alpha: 0.5
  chunk_limit: 5
  qt_strategy : "multi_query"
  max_retries : 3
  web_search_enabled : True
  metadata_extraction_allowed : True
  self_reflection : True
