id: "xandry12_IncrementalAdaptiveRagGenerator_gemma_default_multiquery"
name: "Incremental Adaptive RAG using Gemma 3 12B with multi query and web search"
description: "Incremental adaptive RAG powered by (Gemma 3 12B) with multi-query retrieval and web search support. Maintains conversational context across messages. Fast and suitable for Czech responses."
class_name: "IncrementalAdaptiveRagGenerator"
params:
  model_type: "OPENAI"
  model_name: "google/gemma-3-12b-it"
  temperature: 0.0
  search_type : "hybrid"
  alpha: 0.5
  chunk_limit: 10
  qt_strategy : "multi_query"
  max_retries : 3
  web_search_enabled : True
  metadata_extraction_allowed : True
  self_reflection : True