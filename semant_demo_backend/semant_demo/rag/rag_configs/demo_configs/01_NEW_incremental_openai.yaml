id: "xandry12_IncrementalAdaptiveRagGenerator_openai_default_multiquery_big_model"
name: "RAG using OPENAI GPT 5.1 with multi query and web search"
description: "Advanced adaptive RAG pipeline powered by OpenAI GPT-5.1 with an enhanced multi-query retrieval strategy and optional web search. Supports conversational context across messages. Optimized for fast responses. Answers in Czech."
class_name: "IncrementalAdaptiveRagGenerator"
params:
  model_type: "OPENAI"
  model_name: "gpt-5.1"
  temperature: 0.0
  search_type : "hybrid"
  alpha: 0.5
  chunk_limit: 10
  qt_strategy : "multi_query"
  max_retries : 3
  web_search_enabled : True
  metadata_extraction_allowed : True
  self_reflection : True