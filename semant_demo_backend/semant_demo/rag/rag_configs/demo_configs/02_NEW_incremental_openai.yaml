id: "xandry12_IncrementalAdaptiveRagGenerator_openai_default_multiquery"
name: "RAG using OPENAI GPT-4o-mini with multi query and web search"
description: "Incremental adaptive RAG using GPT-4o-mini with a multi-query retrieval strategy and integrated web search. Maintains conversation history across messages. Fast and efficient. Answers in Czech."
class_name: "IncrementalAdaptiveRagGenerator"
params:
  model_type: "OPENAI"
  model_name: "gpt-4o-mini"
  temperature: 0.0
  search_type : "hybrid"
  alpha: 0.5
  chunk_limit: 10
  qt_strategy : "multi_query"
  max_retries : 3
  web_search_enabled : True
  metadata_extraction_allowed : True
  self_reflection : True