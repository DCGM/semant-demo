name: Deploy

# 1
on:
  push:
    branches: [main, 68-cicd]
    tags: ["v*.*.*"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: [self-hosted, semant-server]
    environment: production
    timeout-minutes: 30

    steps:
      - name: Validate and prepare deploy directory
        run: |
          set -euo pipefail
          RUNNER_WORKDIR="${{ vars.RUNNER_WORKDIR }}"
          DEPLOY_SUBDIR="${{ vars.DEPLOY_SUBDIR }}"

          # Security: validate DEPLOY_SUBDIR before using it
          if [[ -z "$RUNNER_WORKDIR" ]] || [[ -z "$DEPLOY_SUBDIR" ]]; then
            echo "ERROR: RUNNER_WORKDIR and DEPLOY_SUBDIR variables must be set"
            exit 1
          fi

          if [[ "$DEPLOY_SUBDIR" == *".."* ]] || [[ "$DEPLOY_SUBDIR" == /* ]]; then
            echo "ERROR: DEPLOY_SUBDIR must be a relative directory name, not absolute or containing .."
            exit 1
          fi

          CANONICAL=$(cd "$RUNNER_WORKDIR" && pwd)
          FULL_PATH="$RUNNER_WORKDIR/$DEPLOY_SUBDIR"
          if [[ ! "$FULL_PATH" == "$CANONICAL"* ]]; then
            echo "ERROR: Full deploy path must be under RUNNER_WORKDIR=$RUNNER_WORKDIR"
            exit 1
          fi

          mkdir -p "$FULL_PATH"
          echo "Deploy directory validated and ready: $FULL_PATH"

      - name: Update deploy/ files
        run: |
          set -euo pipefail
          set -x
          RUNNER_WORKDIR="${{ vars.RUNNER_WORKDIR }}"
          REF_NAME="${{ github.ref_name }}"
          DEPLOY_PATH="${RUNNER_WORKDIR}/${{ vars.DEPLOY_SUBDIR }}"
          TMP_DIR="/tmp/semant-deploy"

          mkdir -p "$DEPLOY_PATH"
          rm -rf "$TMP_DIR" && mkdir -p "$TMP_DIR"

          # Use sparse checkout to fetch only the deploy/ directory
          git clone --depth=1 --filter=blob:none --sparse \
            --branch "$REF_NAME" \
            "https://github.com/DCGM/semant-demo.git" \
            "$TMP_DIR/repo"

          cd "$TMP_DIR/repo"
          git sparse-checkout set deploy

          if [ ! -d "deploy" ]; then
            echo "deploy/ not found in repository for ref $REF_NAME" >&2
            exit 1
          fi

          # Move deploy contents into DEPLOY_PATH atomically
          rm -rf "$DEPLOY_PATH/deploy.new" || true
          mv "deploy" "$DEPLOY_PATH/deploy.new"
          shopt -s dotglob || true
          mv -f "$DEPLOY_PATH/deploy.new/"* "$DEPLOY_PATH/" || true
          rm -rf "$DEPLOY_PATH/deploy.new"
          rm -rf "$TMP_DIR"

      - name: Create .env
        run: |
          DEPLOY_PATH="${{ vars.RUNNER_WORKDIR }}/${{ vars.DEPLOY_SUBDIR }}"
          cp "$DEPLOY_PATH/.env.example" "$DEPLOY_PATH/.env"
          sed -i "s|^BRANCH=.*|BRANCH=${{ github.ref_name }}|" "$DEPLOY_PATH/.env"
          sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}|" "$DEPLOY_PATH/.env"

      - name: Build and start
        id: build
        working-directory: ${{ vars.RUNNER_WORKDIR }}/${{ vars.DEPLOY_SUBDIR }}
        run: |
          OLD_BACKEND=$(docker compose images -q semant-demo 2>/dev/null || true)
          OLD_EMBED=$(docker compose images -q embedding-service 2>/dev/null || true)
          [ -n "$OLD_BACKEND" ] && docker tag "$OLD_BACKEND" semant-demo-rollback || true
          [ -n "$OLD_EMBED"   ] && docker tag "$OLD_EMBED"   semant-demo-embedding-rollback || true

          ./update.sh build
          ./update.sh up -d

      - name: Health check
        id: health
        run: |
          for i in $(seq 1 15); do
            sleep 10
            echo "Attempt $i/15..."
            if curl --fail --silent --max-time 10 http://localhost:8000/health; then
              echo "Health check passed"
              docker rmi semant-demo-rollback semant-demo-embedding-rollback 2>/dev/null || true
              docker image prune -f --filter label=project=semant-demo
              exit 0
            fi
          done
          echo "Health check failed after 15 attempts."
          exit 1

      - name: Rollback
        if: failure() && steps.health.outcome == 'failure'
        working-directory: ${{ vars.RUNNER_WORKDIR }}/${{ vars.DEPLOY_SUBDIR }}
        run: |
          PREV=$(grep "^BRANCH=" .env | cut -d= -f2)
          if [ -z "$PREV" ]; then echo "First deploy – skipping rollback."; exit 1; fi
          echo "Rolling back to $PREV..."

          BACKEND_IMG=$(docker compose images semant-demo --format json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['Image'])" 2>/dev/null || true)
          EMBED_IMG=$(docker compose images embedding-service --format json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['Image'])" 2>/dev/null || true)
          [ -n "$BACKEND_IMG" ] && docker tag semant-demo-rollback "$BACKEND_IMG" || true
          [ -n "$EMBED_IMG"   ] && docker tag semant-demo-embedding-rollback "$EMBED_IMG" || true

          sed -i "s|^BRANCH=.*|BRANCH=$PREV|" .env
          ./update.sh up -d
          echo "Rollback complete."